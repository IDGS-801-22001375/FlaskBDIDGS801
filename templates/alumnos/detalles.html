{% extends 'layout.html' %}

{% block container %}

<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-gray-50 py-16 px-6">
    <div class="max-w-4xl mx-auto">

        <div class="mb-8">
            <a href="{{ url_for('alumnos.lista_alumnos') }}"
                class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition">
                ← Regresar a la lista
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border border-gray-200 overflow-hidden md:flex">

            <div class="md:w-1/3 bg-gray-100 flex items-center justify-center p-8">
                <img class="w-40 h-40 object-cover rounded-full border border-gray-300 shadow-sm"
                    src="{{ url_for('static', filename='img/user.png') }}" alt="Alumno">
            </div>

            <div class="md:w-2/3 p-10">
                <h2 class="text-3xl font-semibold text-gray-800 mb-8">
                    Datos del Alumno
                </h2>

                <div class="space-y-6">

                    <div>
                        <p class="text-sm text-gray-500">Nombre</p>
                        <p class="text-lg font-medium text-gray-800">{{ nombre }}</p>
                    </div>

                    <div>
                        <p class="text-sm text-gray-500">Apellidos</p>
                        <p class="text-lg font-medium text-gray-800">{{ apellidos }}</p>
                    </div>

                    <div>
                        <p class="text-sm text-gray-500">Correo Electrónico</p>
                        <p class="text-lg font-medium text-gray-800">{{ email }}</p>
                    </div>

                    <div>
                        <p class="text-sm text-gray-500">Teléfono</p>
                        <p class="text-lg font-medium text-gray-800">{{ telefono }}</p>
                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
