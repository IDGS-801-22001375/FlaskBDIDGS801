{% extends 'layout.html' %}

{% block container %}
{% import "_macros.html" as macros %}

<script src="https://cdn.tailwindcss.com"></script>

<div class="w-full max-w-lg p-8 bg-white border border-gray-200 rounded-2xl shadow-xl">

    <div class="mb-8 text-center">
        <h2 class="text-2xl font-bold text-gray-900">Editar inscripción</h2>
        <p class="text-gray-500 text-sm">Completa los datos para la inscripción.</p>
    </div>

    <form action="" method="POST" novalidate>
        {{ form.csrf_token }}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grid md:grid-cols-2 md:gap-6">

            <input type="hidden" name="id" value="{{ form.id.data }}">
            <input type="hidden" name="alumno" value="{{ form.alumno.data }}">

            <div class="relative z-0 w-full mb-6 group">
                <label for="curso" class="block mb-2 text-sm font-medium text-gray-900">
                    Seleccionar curso
                </label>

                <select name="curso" id="curso" class="block w-full p-2.5 text-sm text-gray-900 bg-gray-50 border border-gray-300 
        rounded-lg focus:ring-blue-500 focus:border-blue-500">

                    <option disabled selected>Selecciona un curso</option>

                    {% for curso in cursos %}
                    <option value="{{ curso.id }}">
                        {{ curso.nombre }}
                    </option>
                    {% endfor %}

                </select>
            </div>

        </div>

        <div class="flex gap-4">
            <button type="submit" class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none 
            focus:ring-blue-300 font-semibold rounded-lg text-sm px-5 py-3 text-center transition-all 
            duration-200" id="btn1" name="btn1">
                Editar Ahora
            </button>
            <a href="{{ url_for('inscripciones.lista_inscripciones') }}" class="w-full text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:outline-none 
            focus:ring-red-300 font-semibold rounded-lg text-sm px-5 py-3 text-center transition-all 
            duration-200" id="btn2" name="btn2">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
